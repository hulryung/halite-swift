name: release

# On v* tag push (or manual trigger), runs the full release pipeline:
#   build → codesign → notarize → .dmg → GitHub Release → appcast update (push to main).
#
# Required secrets (Settings → Secrets and variables → Actions). Nothing needs
# to be set until the first real release — until then this workflow merely
# fails, with no other impact:
#   APPLE_CERTIFICATE_BASE64      Developer ID Application .p12 → base64 -i cert.p12
#   APPLE_CERTIFICATE_PASSWORD    .p12 import password
#   APPLE_SIGNING_IDENTITY        "Developer ID Application: Your Name (TEAMID)"
#   APP_STORE_CONNECT_KEY_B64     App Store Connect API key (.p8) → base64
#   APP_STORE_CONNECT_KEY_ID      ASC API Key ID (e.g. 87VR84KH53)
#   APP_STORE_CONNECT_ISSUER      ASC Issuer ID (UUID)
#   APPLE_TEAM_ID                 ABCDE12345
#   (legacy alternative: APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD)
#   SPARKLE_PUBLIC_KEY            base64 EdDSA public key (sparkle-keygen.sh output)
#   SPARKLE_PRIVATE_KEY           base64 EdDSA private key (keychain export → base64)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.13), without the leading v'
        required: true
        type: string

permissions:
  contents: write   # create GitHub Release + push appcast.xml to main

jobs:
  release:
    runs-on: macos-14   # arm64. See RELEASE.md for universal builds.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history → monotonic build number + committing appcast to main

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version + build number
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          {
            echo "version=$VERSION"
            echo "build=$BUILD_NUMBER"
            echo "tag=v$VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION (build $BUILD_NUMBER)"

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/damson-signing.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          # Put the build keychain first in the search list and let codesign access the key non-interactively.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign, notarize, dmg
        env:
          MARKETING_VERSION: ${{ steps.ver.outputs.version }}
          BUILD_NUMBER: ${{ steps.ver.outputs.build }}
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
          BUILD_CHANNEL: release
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APP_STORE_CONNECT_KEY_B64: ${{ secrets.APP_STORE_CONNECT_KEY_B64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Notarization: prefer the ASC API key (.p8) — decode to a file and pass via notarytool --key.
          if [[ -n "$APP_STORE_CONNECT_KEY_B64" ]]; then
            echo "$APP_STORE_CONNECT_KEY_B64" | base64 --decode > "$RUNNER_TEMP/asc_key.p8"
            export APP_STORE_CONNECT_KEY_FILE="$RUNNER_TEMP/asc_key.p8"
          fi
          CLEAN=1 ./scripts/build-app.sh
          ./scripts/sign-and-notarize.sh
          ./scripts/build-dmg.sh
          rm -f "$RUNNER_TEMP/asc_key.p8"

      - name: Create GitHub Release (upload dmg)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          DMG="dist/Damson-$VERSION.dmg"
          # Create the release if absent (tag included — the workflow_dispatch path); otherwise just refresh assets.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" --clobber
          else
            gh release create "$TAG" "$DMG" \
              --title "Damson $VERSION" \
              --generate-notes \
              --target "$GITHUB_SHA"
          fi

      - name: Update appcast on main
        env:
          SPARKLE_PRIVATE_KEY_B64: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          BUILD="${{ steps.ver.outputs.build }}"
          TAG="${{ steps.ver.outputs.tag }}"
          DMG="dist/Damson-$VERSION.dmg"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/$TAG/Damson-$VERSION.dmg"

          # Raw EdDSA private key for sign_update (the secret is base64-encoded once).
          export SPARKLE_PRIVATE_KEY="$(echo "$SPARKLE_PRIVATE_KEY_B64" | base64 --decode)"

          # Generate the <item> block for the signed dmg (untracked — survives across checkouts).
          ./scripts/sparkle-appcast.sh \
            --dmg "$DMG" --version "$VERSION" --build "$BUILD" --url "$URL" > entry.xml

          # Tag builds run on a detached HEAD, so switch to main and commit the appcast there.
          # (The tracked tree is clean at this point — dist/.build are gitignored.)
          git fetch origin main
          git checkout -B main origin/main
          python3 .github/scripts/insert-appcast-entry.py appcast.xml entry.xml > appcast.new.xml
          mv appcast.new.xml appcast.xml
          rm -f entry.xml

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "appcast unchanged — nothing to push"
          else
            git commit -m "appcast $VERSION"
            git push origin main
          fi
