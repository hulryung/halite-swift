name: release

# v* 태그 push 시 (또는 수동 트리거 시) 전체 릴리즈 파이프라인 실행:
#   build → codesign → notarize → .dmg → GitHub Release → appcast 갱신(main에 push).
#
# 필요한 secrets (Settings → Secrets and variables → Actions). 정식 릴리즈를 찍기
# 전까지는 설정 안 해도 됨 — 그 전엔 이 워크플로가 실패할 뿐 다른 영향 없음:
#   APPLE_CERTIFICATE_BASE64      Developer ID Application .p12 → base64 -i cert.p12
#   APPLE_CERTIFICATE_PASSWORD    .p12 import password
#   APPLE_SIGNING_IDENTITY        "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                      Apple ID 이메일
#   APPLE_APP_SPECIFIC_PASSWORD   appleid.apple.com 발급
#   APPLE_TEAM_ID                 ABCDE12345
#   SPARKLE_PUBLIC_KEY            base64 EdDSA public key (sparkle-keygen.sh 출력)
#   SPARKLE_PRIVATE_KEY           base64 EdDSA private key (keychain export → base64)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.13), without the leading v'
        required: true
        type: string

permissions:
  contents: write   # GitHub Release 생성 + appcast.xml을 main에 push

jobs:
  release:
    runs-on: macos-14   # arm64. universal 빌드는 RELEASE.md 참조.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 전체 히스토리 → 단조 증가 build number + appcast를 main에 commit

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version + build number
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          {
            echo "version=$VERSION"
            echo "build=$BUILD_NUMBER"
            echo "tag=v$VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION (build $BUILD_NUMBER)"

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/damson-signing.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          # build keychain을 검색 목록 맨 앞에 두고, codesign이 비대화식으로 키에 접근하도록 허용.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign, notarize, dmg
        env:
          MARKETING_VERSION: ${{ steps.ver.outputs.version }}
          BUILD_NUMBER: ${{ steps.ver.outputs.build }}
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
          BUILD_CHANNEL: release
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          CLEAN=1 ./scripts/build-app.sh
          ./scripts/sign-and-notarize.sh
          ./scripts/build-dmg.sh

      - name: Create GitHub Release (upload dmg)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          DMG="dist/Damson-$VERSION.dmg"
          # 릴리즈가 없으면 생성(태그도 함께 — workflow_dispatch 경로), 이미 있으면 자산만 갱신.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" --clobber
          else
            gh release create "$TAG" "$DMG" \
              --title "Damson $VERSION" \
              --generate-notes \
              --target "$GITHUB_SHA"
          fi

      - name: Update appcast on main
        env:
          SPARKLE_PRIVATE_KEY_B64: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          BUILD="${{ steps.ver.outputs.build }}"
          TAG="${{ steps.ver.outputs.tag }}"
          DMG="dist/Damson-$VERSION.dmg"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/$TAG/Damson-$VERSION.dmg"

          # sign_update에 넘길 raw EdDSA private key (secret은 base64 1회 인코딩).
          export SPARKLE_PRIVATE_KEY="$(echo "$SPARKLE_PRIVATE_KEY_B64" | base64 --decode)"

          # 서명된 dmg에 대한 <item> 블록 생성 (untracked — checkout 사이에서 살아남음).
          ./scripts/sparkle-appcast.sh \
            --dmg "$DMG" --version "$VERSION" --build "$BUILD" --url "$URL" > entry.xml

          # 태그 빌드는 detached HEAD라 main으로 전환해 거기에 appcast를 commit.
          # (이 시점 tracked 트리는 깨끗함 — dist/.build는 gitignore.)
          git fetch origin main
          git checkout -B main origin/main
          python3 .github/scripts/insert-appcast-entry.py appcast.xml entry.xml > appcast.new.xml
          mv appcast.new.xml appcast.xml
          rm -f entry.xml

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "appcast unchanged — nothing to push"
          else
            git commit -m "appcast $VERSION"
            git push origin main
          fi
