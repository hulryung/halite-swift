name: release

# tag push로 트리거 (v0.1.0 같은 SemVer 태그).
# 빌드 → 코드사인 → 노타라이즈 → .dmg → Sparkle EdDSA 서명 → appcast 업데이트
# → GitHub Release 생성 + .dmg 첨부 → appcast.xml 커밋 + push.
#
# 필요한 GitHub Actions secrets (Settings → Secrets and variables → Actions):
#
#   APPLE_CERTIFICATE_BASE64    Developer ID Application .p12를 base64로 인코딩.
#                               생성: security export -k login.keychain-db -t identities
#                                     -f pkcs12 -o cert.p12 -P "<pw>"
#                                     base64 -i cert.p12 | pbcopy
#   APPLE_CERTIFICATE_PASSWORD  .p12 import 시 사용한 password.
#   APPLE_SIGNING_IDENTITY      예: "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                    Apple ID 이메일.
#   APPLE_APP_SPECIFIC_PASSWORD https://appleid.apple.com 에서 발급.
#   APPLE_TEAM_ID               예: ABCDE12345
#   SPARKLE_PUBLIC_KEY          base64 Sparkle EdDSA public key.
#   SPARKLE_PRIVATE_KEY         base64 Sparkle EdDSA private key. CI 임시
#                               keychain에 import 후 sign_update가 사용.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version (e.g. 0.1.0). Tag 없이 수동 실행할 때 사용.'
        required: true
        default: '0.1.0'

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # refs/tags/vX.Y.Z → X.Y.Z
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || true

      - name: Set up signing keychain
        env:
          CERT_B64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PW: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=halite-ci.keychain-db
          KEYCHAIN_PW="$(openssl rand -hex 24)"
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          # 현재 user search list에 새 keychain 추가 (login.keychain 유지하면서).
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          # 인증서 import.
          echo "$CERT_B64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$CERT_PW" \
              -T /usr/bin/codesign -T /usr/bin/security
          rm -f /tmp/cert.p12
          # codesign이 prompt 없이 keychain 사용하도록 partition list 설정.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PW" "$KEYCHAIN" > /dev/null

      - name: Import Sparkle private key
        env:
          PRIV_B64: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${PRIV_B64:-}" ]]; then
            echo "SPARKLE_PRIVATE_KEY secret 미설정 — appcast 서명 단계는 건너뜀" >&2
            echo "HAS_SPARKLE_KEY=0" >> "$GITHUB_ENV"
            exit 0
          fi
          # generate_keys -x로 import. login.keychain에 저장 (CI에선 임시).
          echo "$PRIV_B64" | base64 --decode > /tmp/sparkle.priv
          # 위 import 전에 build-app.sh가 generate_keys binary를 받아두어야 함.
          # 그래서 여기선 GITHUB_ENV에만 잡아두고, 빌드 후 실제 import.
          echo "HAS_SPARKLE_KEY=1" >> "$GITHUB_ENV"

      - name: Build .app
        env:
          MARKETING_VERSION: ${{ steps.ver.outputs.version }}
          BUILD_NUMBER: ${{ steps.ver.outputs.build }}
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
        run: ./scripts/build-app.sh

      - name: Import Sparkle key into keychain
        if: env.HAS_SPARKLE_KEY == '1'
        run: |
          set -euo pipefail
          GEN=.build/artifacts/sparkle/Sparkle/bin/generate_keys
          if [[ ! -x "$GEN" ]]; then
            echo "warning: $GEN 없음 — 빌드 정상 여부 확인" >&2
            exit 0
          fi
          "$GEN" -f /tmp/sparkle.priv || true
          rm -f /tmp/sparkle.priv

      - name: Sign + notarize .app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/sign-and-notarize.sh

      - name: Build + sign + notarize .dmg
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/build-dmg.sh

      - name: Generate appcast entry
        if: env.HAS_SPARKLE_KEY == '1'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          BUILD: ${{ steps.ver.outputs.build }}
        run: |
          set -euo pipefail
          DMG="dist/Halite-$VERSION.dmg"
          URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION/Halite-$VERSION.dmg"
          mkdir -p dist
          ./scripts/sparkle-appcast.sh \
              --dmg "$DMG" \
              --version "$VERSION" \
              --build "$BUILD" \
              --url "$URL" \
              > dist/entry.xml
          # 기존 appcast.xml의 <channel> 안에 entry 삽입 (newest first).
          python3 .github/scripts/insert-appcast-entry.py \
              appcast.xml dist/entry.xml > dist/appcast.new.xml
          mv dist/appcast.new.xml appcast.xml

      - name: Commit appcast.xml
        if: env.HAS_SPARKLE_KEY == '1' && github.event_name == 'push'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- appcast.xml; then
            echo "appcast.xml 변화 없음"
          else
            git add appcast.xml
            git commit -m "Update appcast.xml for v${{ steps.ver.outputs.version }}"
            git push origin HEAD:main
          fi

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "v$VERSION" \
              --title "halite $VERSION" \
              --notes "halite-swift $VERSION 릴리즈." \
              "dist/Halite-$VERSION.dmg"
